<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    width:400px;
    margin:auto;
    margin-top:50px;
}

textarea {
    width:100%;
    height:100px;
    margin-top:10px;
}

button {
    margin:10px;
    padding:10px;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>🎤 TalkTrack Dashboard</h2>

<div class="card">

<form action="/upload" method="POST" enctype="multipart/form-data">
<input type="file" name="ppt" required><br>
<button>Upload PPT</button>
</form>

<textarea id="speechText"></textarea>

<br>

<button onclick="startSpeech()">Start</button>
<button onclick="stopSpeech()">Stop</button>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

{% if spoken %}
<h3>Results</h3>
<p>Accuracy: {{accuracy}}%</p>
<p>Fillers: {{fillers}}</p>
<p>Speed: {{wpm}}</p>
<p>Pauses: {{pauses}}</p>

<ul>
{% for f in feedback %}
<li>{{f}}</li>
{% endfor %}
</ul>
{% endif %}

</div>

<script>
let recognition;
let finalText = "";

function startSpeech() {
    finalText = "";
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function(event) {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            let t = event.results[i][0].transcript;
            if (event.results[i].isFinal) finalText += t + " ";
            else interim += t;
        }
        document.getElementById("speechText").value = finalText + interim;
    };

    recognition.start();
}

function stopSpeech() {
    recognition.stop();

    setTimeout(() => {
        let text = document.getElementById("speechText").value;

        fetch("/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "text=" + encodeURIComponent(text)
        })
        .then(r => r.text())
        .then(html => {
            document.open();
            document.write(html);
            document.close();
        });
    }, 500);
}
</script>

</body>
</html>
