<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>

<body style="text-align:center; background:#0f172a; color:white; padding:40px;">

<h2>TalkTrack Dashboard</h2>

<!-- Upload PPT -->
<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="ppt" required>
    <button type="submit">Upload PPT</button>
</form>

<br>

<!-- Speech box -->
<textarea id="speechText" rows="5" cols="50" placeholder="Speak here..."></textarea>

<br><br>

<button onclick="startSpeech()">Start</button>
<button onclick="stopSpeech()">Stop</button>

<!-- Hidden form -->
<form id="analyzeForm" action="/analyze" method="POST">
    <input type="hidden" name="text" id="hiddenText">
</form>

<hr>

<!-- ERROR -->
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<!-- RESULTS -->
{% if spoken %}
<h3>Results</h3>
<p><b>Spoken:</b> {{ spoken }}</p>
<p><b>Accuracy:</b> {{ accuracy }}%</p>
<p><b>Fillers:</b> {{ fillers }}</p>
<p><b>Speed:</b> {{ wpm }} WPM</p>
<p><b>Pauses:</b> {{ pauses }}</p>

<h3>AI Feedback</h3>
<ul>
    {% for f in feedback %}
    <li>{{ f }}</li>
    {% endfor %}
</ul>
{% endif %}

<script>
let recognition;

function startSpeech() {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;

    recognition.onresult = function(event) {
        let text = "";
        for (let i = 0; i < event.results.length; i++) {
            text += event.results[i][0].transcript;
        }
        document.getElementById("speechText").value = text;
    };

    recognition.start();
}

function stopSpeech() {
    recognition.stop();

    document.getElementById("hiddenText").value =
        document.getElementById("speechText").value;

    document.getElementById("analyzeForm").submit();
}
</script>

</body>
</html>
