<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        header {
            background: #020617;
            padding: 15px;
            font-size: 22px;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 15px;
            width: 420px;
            margin: auto;
        }

        textarea {
            width: 90%;
            height: 80px;
            margin-top: 10px;
            border-radius: 10px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .start-btn {
            background: #38bdf8;
        }

        .stop-btn {
            background: #ef4444;
        }

        .upload-btn {
            background: #38bdf8;
        }

        .analyze-btn {
            background: #38bdf8;
        }

        .results {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>

<header>🎤 TalkTrack Dashboard</header>

<div class="container">
<div class="card">

    <!-- UPLOAD -->
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="ppt" required>
        <br><br>
        <button class="upload-btn">Upload PPT</button>
    </form>

    <!-- TEXT AREA -->
    <textarea id="speechText" placeholder="Your speech will appear here..."></textarea>

    <br>

    <!-- SPEECH BUTTONS -->
    <button class="start-btn" onclick="startSpeech()">▶ Start Presentation</button>
    <button class="stop-btn" onclick="stopSpeech()">■ Stop</button>

    <br>

    <!-- ANALYZE -->
    <form action="/analyze" method="POST" onsubmit="setText()">
        <input type="hidden" name="text" id="hiddenText">
        <button class="analyze-btn">Analyze</button>
    </form>

    <!-- RESULTS -->
    {% if done %}
    <div class="results">
        <hr>
        <h3>📊 Results</h3>

        <p><b>Spoken:</b> {{ spoken }}</p>
        <p><b>Accuracy:</b> {{ accuracy }}%</p>
        <p><b>Fillers:</b> {{ fillers }}</p>
        <p><b>Speed:</b> {{ wpm }} WPM</p>
        <p><b>Pauses:</b> {{ pauses }}</p>

        <h3>🧠 AI Feedback</h3>
        <ul>
            {% for f in feedback %}
            <li>{{ f }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <!-- ERROR -->
    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

</div>
</div>

<script>
let recognition;

function startSpeech() {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;

    recognition.onresult = function(event) {
        let transcript = "";
        for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        document.getElementById("speechText").value = transcript;
    };

    recognition.start();
}

function stopSpeech() {
    if (recognition) {
        recognition.stop();
    }
}

function setText() {
    document.getElementById("hiddenText").value =
        document.getElementById("speechText").value;
}
</script>

</body>
</html>
