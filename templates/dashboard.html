<!DOCTYPE html>
<html>
<head>
    <title>TalkTrack Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 450px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            margin-top: 10px;
            resize: none;
            font-size: 14px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .upload { background: #38bdf8; color: black; }
        .start { background: #22c55e; color: white; }
        .stop { background: #ef4444; color: white; }

        .results {
            margin-top: 20px;
            text-align: left;
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 10px;
        }

        ul {
            padding-left: 20px;
        }

        .error {
            color: #f87171;
        }

        .success {
            color: #4ade80;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🎤 TalkTrack Dashboard</h2>

    <!-- Upload PPT -->
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="ppt" accept=".pptx">
        <br>
        <button type="submit" class="upload">Upload PPT</button>
    </form>

    <!-- Messages -->
    {% if error %}
        <p class="error">{{error}}</p>
    {% endif %}

    <!-- Speech Box -->
    <textarea id="speechText" placeholder="Speak here..."></textarea>

    <br>

    <!-- Buttons -->
    <button type="button" class="start" onclick="startSpeech()">▶ Start</button>
    <button type="button" class="stop" onclick="stopSpeech()">■ Stop</button>

    <!-- Hidden Form -->
    <form id="form" action="/analyze" method="POST">
        <input type="hidden" name="text" id="hiddenText">
    </form>

    <!-- ✅ RESULTS (SAFE CONDITION) -->
    {% if spoken is defined %}
    <div class="results">
        <h3>📊 Results</h3>

        <p><b>📝 Spoken:</b> {{spoken}}</p>
        <p><b>🗣 Filler Words:</b> {{fillers}}</p>
        <p><b>⏸ Pauses:</b> {{pauses}}</p>
        <p><b>⚡ Speed:</b> {{wpm}} WPM</p>

        <h3>🤖 AI Feedback</h3>
        <ul>
        {% for f in feedback %}
            <li>{{f}}</li>
        {% endfor %}
        </ul>
    </div>
    {% endif %}

</div>

<script>
let recognition;
let finalText = "";

function startSpeech(){
    document.getElementById("speechText").value = "";

    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;

    finalText = "";

    recognition.onresult = function(e){
        let interim = "";

        for(let i = e.resultIndex; i < e.results.length; i++){
            let t = e.results[i][0].transcript;

            if(e.results[i].isFinal){
                finalText += t + " ";
            } else {
                interim += t;
            }
        }

        document.getElementById("speechText").value = finalText + interim;
    };

    recognition.start();
}

function stopSpeech(){
    if(recognition){
        recognition.stop();
    }

    setTimeout(()=>{
        let text = document.getElementById("speechText").value;

        if(text.trim() === ""){
            alert("No speech detected");
            return;
        }

        document.getElementById("hiddenText").value = text;
        document.getElementById("form").submit();

    }, 1200);  // important delay
}
</script>

</body>
</html>
