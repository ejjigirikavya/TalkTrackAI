<!DOCTYPE html>
<html>
<head>
    <title>TalkTrack Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 15px;
            border-radius: 10px;
            padding: 10px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
        .upload { background: #2196F3; color: white; }

        .results {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>

<h2>🎤 TalkTrack Dashboard</h2>

<div class="card">

    <!-- UPLOAD -->
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="ppt" required>
        <br><br>
        <button class="upload">Upload PPT</button>
    </form>

    <!-- SPEECH BOX -->
    <textarea id="speechText" placeholder="Speak here..."></textarea>

    <br>

    <button class="start" onclick="startSpeech()">▶ Start</button>
    <button class="stop" onclick="stopSpeech()">■ Stop</button>

    <!-- ERROR -->
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <!-- RESULTS -->
    {% if spoken %}
    <div class="results">
        <h3>📊 Results</h3>

        <p><b>Spoken:</b> {{ spoken }}</p>
        <p><b>Accuracy:</b> {{ accuracy }}%</p>
        <p><b>Fillers:</b> {{ fillers }}</p>
        <p><b>Speed:</b> {{ wpm }} WPM</p>
        <p><b>Pauses:</b> {{ pauses }}</p>

        <h4>🧠 AI Feedback</h4>
        <ul>
            {% for f in feedback %}
            <li>{{ f }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

</div>

<!-- JS -->
<script>
let recognition;
let finalText = "";

function startSpeech() {
    finalText = "";

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function(event) {
        let interim = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            let transcript = event.results[i][0].transcript;

            if (event.results[i].isFinal) {
                finalText += transcript + " ";
            } else {
                interim += transcript;
            }
        }

        document.getElementById("speechText").value = finalText + interim;
    };

    recognition.start();
}

function stopSpeech() {
    recognition.stop();

    setTimeout(() => {
        let text = document.getElementById("speechText").value.trim();

        if (text === "") {
            alert("No speech detected");
            return;
        }

        fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
            },
            body: "text=" + encodeURIComponent(text)
        })
        .then(res => res.text())
        .then(html => {
            document.open();
            document.write(html);
            document.close();
        });

    }, 500);
}
</script>

</body>
</html>
