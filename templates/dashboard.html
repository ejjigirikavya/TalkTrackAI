<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>

<body>

<h2>TalkTrack Dashboard</h2>

<!-- Upload -->
<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="ppt" required>
    <button>Upload PPT</button>
</form>

<br>

<!-- Speech -->
<textarea id="speechText" placeholder="Your speech will appear here..."></textarea>

<br><br>

<button onclick="startSpeech()">Start Presentation</button>
<button onclick="stopSpeech()">Stop</button>

<br><br>

<form action="/analyze" method="POST" onsubmit="setText()">
    <input type="hidden" name="text" id="hiddenText">
    <button type="submit">Analyze</button>
</form>

<hr>

{% if done %}
<h3>Results</h3>

<p><b>Spoken:</b> {{ spoken }}</p>
<p><b>Accuracy:</b> {{ accuracy }}%</p>
<p><b>Fillers:</b> {{ fillers }}</p>
<p><b>Speed:</b> {{ wpm }} WPM</p>
<p><b>Pauses:</b> {{ pauses }}</p>

<h4>AI Feedback</h4>
<ul>
{% for f in feedback %}
<li>{{ f }}</li>
{% endfor %}
</ul>

{% endif %}

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<script>
let recognition;

function startSpeech() {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;

    recognition.onresult = function(event) {
        let text = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            text += event.results[i][0].transcript;
        }
        document.getElementById("speechText").value = text;
    };

    recognition.start();
}

function stopSpeech() {
    recognition.stop();
}

function setText() {
    document.getElementById("hiddenText").value =
        document.getElementById("speechText").value;
}
</script>

</body>
</html>
