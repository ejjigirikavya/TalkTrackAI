<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
.card{
    width:400px;
    margin:auto;
    margin-top:50px;
    padding:20px;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
}
textarea{
    width:100%;
    height:100px;
}
button{
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<div class="card">

<h2>TalkTrack Dashboard</h2>

<!-- Upload PPT -->
<form action="/upload" method="POST" enctype="multipart/form-data">
<input type="file" name="ppt">
<button type="submit">Upload PPT</button>
</form>

<br>

<!-- Speech box -->
<textarea id="speechText" placeholder="Speak here..."></textarea>

<br>

<button onclick="startSpeech()">Start</button>
<button onclick="stopSpeech()">Stop</button>

<!-- Hidden form -->
<form id="form" action="/analyze" method="POST">
<input type="hidden" name="text" id="hiddenText">
</form>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

{% if spoken %}
<h3>Results</h3>

<p><b>Spoken:</b> {{spoken}}</p>
<p><b>Accuracy:</b> {{accuracy}}%</p>
<p><b>Filler Words:</b> {{fillers}}</p>
<p><b>Pauses:</b> {{pauses}}</p>
<p><b>Speed:</b> {{wpm}} WPM</p>

<h3>🤖 AI Feedback</h3>
<ul>
{% for f in feedback %}
<li>{{f}}</li>
{% endfor %}
</ul>

{% endif %}

</div>

<script>
let recognition;
let finalText = "";

function startSpeech(){
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;

    finalText = "";

    recognition.onresult = function(e){
        let interim = "";

        for(let i = e.resultIndex; i < e.results.length; i++){
            let t = e.results[i][0].transcript;

            if(e.results[i].isFinal){
                finalText += t + " ";
            } else {
                interim += t;
            }
        }

        document.getElementById("speechText").value = finalText + interim;
    };

    recognition.start();
}

function stopSpeech(){
    recognition.stop();

    setTimeout(()=>{
        let text = document.getElementById("speechText").value;

        if(text.trim() === ""){
            alert("No speech detected");
            return;
        }

        document.getElementById("hiddenText").value = text;

        document.getElementById("form").submit();   // ✅ FIXED
    }, 1000);
}
</script>

</body>
</html>
