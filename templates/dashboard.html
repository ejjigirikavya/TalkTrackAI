<!DOCTYPE html>
<html>
<head>
    <title>TalkTrackAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 700px;
            padding: 25px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            border: none;
            padding: 12px;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .start {
            background: #22c55e;
        }

        .start:hover {
            background: #16a34a;
            transform: scale(1.05);
        }

        .stop {
            background: #ef4444;
        }

        .stop:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .results p {
            margin: 6px 0;
        }

        .metric {
            font-size: 18px;
            margin-top: 10px;
        }

        .feedback {
            margin-top: 15px;
        }

        .feedback li {
            margin-left: 20px;
            margin-top: 5px;
        }

        .error {
            color: #f87171;
            text-align: center;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🎤 TalkTrackAI</h2>

    <!-- ERROR -->
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- INPUT CARD -->
    <div class="card">
        <form action="/analyze" method="POST">

            <textarea name="text" placeholder="Speak here..."></textarea>

            <div class="btn-group">
                <button type="button" class="btn start">▶ Start</button>
                <button type="submit" class="btn stop">■ Stop</button>
            </div>

        </form>
    </div>

    <!-- RESULTS CARD -->
    {% if spoken %}
    <div class="card results">

        <p><b>📝 Spoken:</b> {{ spoken }}</p>

        <div class="metric">🎯 Accuracy: {{ accuracy }}%</div>
        <div class="metric">🗣 Filler Words: {{ fillers }}</div>
        <div class="metric">⏸ Pauses: {{ pauses }}</div>
        <div class="metric">⚡ Speed: {{ wpm }} WPM</div>

        <div class="feedback">
            <b>🤖 AI Feedback</b>
            <ul>
                {% for f in feedback %}
                <li>{{ f }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
